<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VS TI Hub</title>
    <link rel="icon" href="https://yt3.googleusercontent.com/TY_CfaW7OV4aqGfiUZP56C_5GTpUcc10Rmyud2qkF9L1ojYiTADJmuQfXnUURvrKDx364quSbjU=s900-c-k-c0x00ffffff-no-rj" type="image/jpeg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/gerador.css">
    <link rel="stylesheet" href="css/historico.css">
    <link rel="stylesheet" href="css/colaboradores.css">
    <link rel="stylesheet" href="css/documentacao.css">
    <link rel="stylesheet" href="css/cadastros.css">
    <link rel="stylesheet" href="css/auth.css">

    <!-- Supabase JS SDK v2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<button class="mobile-toggle" aria-label="Abrir menu lateral"></button>

<!-- ─── SIDEBAR ──────────────────────────────────────── -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <img
            src="https://yt3.googleusercontent.com/TY_CfaW7OV4aqGfiUZP56C_5GTpUcc10Rmyud2qkF9L1ojYiTADJmuQfXnUURvrKDx364quSbjU=s900-c-k-c0x00ffffff-no-rj"
            alt="VS">
        <div class="sidebar-logo-text">
            <strong>VS TI Hub</strong>
            <span>VinilSul Sistemas</span>
        </div>
    </div>

    <div class="nav-section-label">Visão Geral</div>
    <button class="nav-item active" data-nav="home">
        <i class="nav-icon fas fa-home"></i> Home
    </button>

    <button class="nav-item" data-nav="gerador">
        <i class="nav-icon fas fa-wrench"></i> Gerador de Acessos VS
    </button>

    <div class="nav-section-label">Sistemas</div>
    <button class="nav-item" data-nav="helpdesk">
        <i class="nav-icon fas fa-ticket"></i> Helpdesk
    </button>
    <button class="nav-item" data-nav="corporativo">
        <i class="nav-icon fas fa-building"></i> Corporativo
    </button>
    <button class="nav-item" data-nav="telecom">
        <i class="nav-icon fas fa-phone"></i> Telecom
    </button>

    <div class="nav-section-label">Operação</div>
    <button class="nav-item" data-nav="unidades">
        <i class="nav-icon fas fa-city"></i> Unidades &amp; Filiais
    </button>
    <button class="nav-item" data-nav="etiquetas">
        <i class="nav-icon fas fa-tags"></i> Etiquetas de Remessa
    </button>
    <button
        class="nav-item"
        id="nav-colaboradores"
        data-nav="colaboradores"
        style="display:none"
    >
        <i class="nav-icon fas fa-id-badge"></i> Colaboradores Internos
    </button>
    <button
        class="nav-item"
        id="nav-documentacao"
        data-nav="documentacao"
        data-docs-mode="consulta"
        data-badge-label="Documentação"
        style="display:none"
    >
        <i class="nav-icon fas fa-folder-open"></i> Documentação
    </button>

    <div class="sidebar-footer">
        <span class="status-dot"></span> Sistema operacional
    </div>
</aside>

<!-- ─── MAIN ─────────────────────────────────────────── -->
<main class="main">
    <div class="topbar">
        <div class="search-wrap">
            <span class="search-icon"></span>
            <input
                type="text"
                id="searchInput"
                placeholder="Buscar recursos, sistemas, cidades...">
        </div>
        <div class="topbar-right">
            <span class="badge green">● Online</span>
            <span class="badge" id="currentPageBadge">Dashboard</span>
        </div>
    </div>

    <!-- Page content injected here -->
    <div id="pages-container">

        <div class="table-state pages-loader-state" id="pages-loader-state">
            <div class="spinner"></div>
            <div>Carregando módulos da aplicação...</div>
        </div>

    </div><!-- #pages-container -->
</main>

<!-- Scripts (order matters: nav + data layer + auth + feature modules) -->
<script src="js/pages-loader.js"></script>
<script src="js/nav.js"></script>
<script src="js/ui-feedback.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/home.js"></script>
<script src="js/gerador-data.js"></script>
<script src="js/gerador-ui.js"></script>
<script src="js/unidades.js"></script>
<script src="js/etiquetas.js"></script>
<script src="js/documentacao.js"></script>
<script src="js/colaboradores.js"></script>
<script src="js/usuarios.js"></script>
<script src="js/cadastros.js"></script>
<script src="js/direcionadores.js"></script>

</body>
</html>
