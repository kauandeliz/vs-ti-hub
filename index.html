<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VinilSul Hub</title>
    <link rel="icon" href="assets/images/vinilsul-logo.jpg" type="image/jpeg">
    <script>
        (function applySavedTheme() {
            try {
                var savedTheme = localStorage.getItem('vs-ti-hub-theme');
                if (savedTheme === 'light' || savedTheme === 'dark') {
                    document.documentElement.setAttribute('data-theme', savedTheme);
                }
            } catch (error) {
                // no-op
            }
        })();
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/dashboards.css">
    <link rel="stylesheet" href="css/gerador.css">
    <link rel="stylesheet" href="css/historico.css">
    <link rel="stylesheet" href="css/colaboradores.css">
    <link rel="stylesheet" href="css/linhas.css">
    <link rel="stylesheet" href="css/cadastros.css">
    <link rel="stylesheet" href="css/redes.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/theme.css">

    <!-- Supabase JS SDK v2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>

<button class="mobile-toggle" aria-label="Abrir menu lateral"></button>

<!-- ─── SIDEBAR ──────────────────────────────────────── -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <img
            src="assets/images/vinilsul-logo.jpg"
            alt="VinilSul">
        <div class="sidebar-logo-text">
            <strong>VinilSul Hub</strong>
            <span>Plataforma Corporativa</span>
        </div>
    </div>

    <div class="nav-section-label">Hub Corporativo</div>
    <button class="nav-item active" data-nav="home">
        <i class="nav-icon fas fa-home"></i> Home
    </button>
    <button class="nav-item" data-nav="dashboards">
        <i class="nav-icon fas fa-chart-line"></i> Dashboards
    </button>

    <button class="nav-item" data-nav="gerador">
        <i class="nav-icon fas fa-wrench"></i> Gerador de Acessos (TI)
    </button>

    <div class="nav-section-label">Módulo TI</div>
    <button class="nav-item" data-nav="helpdesk">
        <i class="nav-icon fas fa-ticket"></i> Helpdesk
    </button>
    <button class="nav-item" data-nav="corporativo">
        <i class="nav-icon fas fa-building"></i> Corporativo
    </button>
    <button class="nav-item" data-nav="telecom">
        <i class="nav-icon fas fa-phone"></i> Telecom
    </button>

    <div class="nav-section-label">Módulo TI • Gestão</div>
    <button class="nav-item" data-nav="unidades">
        <i class="nav-icon fas fa-city"></i> Unidades &amp; Filiais
    </button>
    <button class="nav-item" data-nav="linhas">
        <i class="nav-icon fas fa-sim-card"></i> Linhas
    </button>
    <button class="nav-item" data-nav="redes">
        <i class="nav-icon fas fa-network-wired"></i> Infraestrutura de Rede
    </button>
    <button
        class="nav-item"
        id="nav-colaboradores"
        data-nav="colaboradores"
        style="display:none"
    >
        <i class="nav-icon fas fa-id-badge"></i> Colaboradores Internos
    </button>
    <div class="sidebar-footer">
        <span class="status-dot"></span> Hub corporativo em operação
    </div>
</aside>

<!-- ─── MAIN ─────────────────────────────────────────── -->
<main class="main">
    <div class="topbar">
        <div class="search-wrap">
            <span class="search-icon"></span>
            <input
                type="text"
                id="searchInput"
                placeholder="Buscar módulos, recursos, sistemas, cidades...">
        </div>
        <div class="topbar-right">
            <button type="button" class="topbar-theme-toggle" id="theme-toggle-btn" aria-label="Ativar modo claro" title="Ativar modo claro">
                <i class="fas fa-sun topbar-theme-icon" id="theme-toggle-icon" aria-hidden="true"></i>
                <span class="topbar-theme-label" id="theme-toggle-label">Modo claro</span>
            </button>
            <span class="badge green">● Online</span>
            <span class="badge" id="currentPageBadge">Dashboard</span>
        </div>
    </div>

    <!-- Page content injected here -->
    <div id="pages-container">

        <div class="table-state pages-loader-state" id="pages-loader-state">
            <div class="spinner"></div>
            <div>Carregando módulos da aplicação...</div>
        </div>

    </div><!-- #pages-container -->
</main>

<!-- Scripts (order matters: nav + data layer + auth + feature modules) -->
<script src="js/pages-loader.js"></script>
<script src="js/nav.js"></script>
<script src="js/theme.js"></script>
<script src="js/ui-feedback.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/home.js"></script>
<script src="js/dashboards.js"></script>
<script src="js/gerador-data.js"></script>
<script src="js/gerador-ui.js"></script>
<script src="js/unidades.js"></script>
<script src="js/linhas.js"></script>
<script src="js/redes.js"></script>
<script src="js/colaboradores.js"></script>
<script src="js/usuarios.js"></script>
<script src="js/cadastros.js"></script>
<script src="js/direcionadores.js"></script>

</body>
</html>
